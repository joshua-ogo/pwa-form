<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #ffffff;
        color: #111827;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 18px;
        background: #fff7ed;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #6b7280;
      }
      code {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" role="status" aria-live="polite">
        <h1>You’re offline</h1>
        <p>
          The app shell wasn’t available in cache. When you’re back online, reload this page.
          (Fallback served from <code>/offline.html</code>.)
        </p>
      </div>
    </div>
  </body>
</html>
